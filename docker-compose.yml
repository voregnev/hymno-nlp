version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hymnography
      POSTGRES_USER: ${PG_USER:-hymn}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-hymn}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hymn"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-hymn1234}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4jdata:/data
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - PG_DSN=postgresql://hymn:${PG_PASSWORD:-hymn}@postgres:5432/hymnography
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-hymn1234}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
